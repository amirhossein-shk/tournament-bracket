name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Clean install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build project
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
